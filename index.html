<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>QRコード受付システム</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <script src="https://unpkg.com/html5-qrcode"></script>
  <style>
    body { font-family: 'Helvetica Neue', Arial, sans-serif; text-align: center; margin: 0; padding: 20px; background-color: #f5f5f5; }
    #camera-view { max-width: 500px; margin: 0 auto; }
    #reader { width: 100%; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
    #result-view { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 1000; }
    .title { font-size: 32px; font-weight: bold; margin-bottom: 20px; }
    .message { font-size: 20px; padding: 0 20px; }
  </style>
</head>
<body>

  <div id="camera-view">
    <h2>QRコードをかざしてください</h2>
    <div id="reader"></div>
  </div>

  <div id="result-view">
    <div class="title" id="res-title"></div>
    <div class="message" id="res-msg"></div>
  </div>

  <script>
    // ⚠️ あなたのGASの本番用URL（末尾が/execのもの）に書き換えてください
    const GAS_URL = "https://script.google.com/macros/s/AKfycbw-K1A33R9OXbObYzOY1PX__KSveZvMQq0AQ71vr3B0DWcdz9b43jQaonm--0zanen3/exec";

    let html5QrcodeScanner;

    function startScanner() {
      document.getElementById('camera-view').style.display = 'block';
      document.getElementById('result-view').style.display = 'none';

      html5QrcodeScanner = new Html5Qrcode("reader");
      html5QrcodeScanner.start(
        { facingMode: "environment" },
        { fps: 10, qrbox: { width: 250, height: 250 } },
        onScanSuccess
      ).catch(err => alert("カメラ起動エラー: " + err));
    }

    function onScanSuccess(decodedText) {
      html5QrcodeScanner.stop().then(() => {
        let uuid = decodedText;
        if (decodedText.includes('uuid=')) {
          const urlParams = new URLSearchParams(decodedText.split('?')[1]);
          uuid = urlParams.get('uuid');
        }

        // GASへデータを送信
        fetch(GAS_URL, {
          method: "POST",
          body: JSON.stringify({ uuid: uuid })
        })
        .then(res => res.json())
        .then(response => {
          onCheckInResponse(response);
        })
        .catch(err => {
          alert("通信エラーが発生しました: " + err);
          startScanner();
        });
      });
    }

    function onCheckInResponse(response) {
  const cameraView = document.getElementById('camera-view');
  const resultView = document.getElementById('result-view');
  
  cameraView.style.display = 'none';
  resultView.style.display = 'flex'; // 画面を表示

  resultView.style.backgroundColor = response.bg;
  document.getElementById('res-title').innerHTML = response.title;
  
  // 👇 ★ここが最重要：成否によって戻り方を変える条件分岐
  if (response.status === "success") {
    // 成功（success）のときだけ、3秒後に自動で戻す
    document.getElementById('res-msg').innerHTML = response.msg;
    setTimeout(() => {
      startScanner();
    }, 3000);
  } else {
    // それ以外（error や already）のときは、自動で戻さず停止する
    document.getElementById('res-msg').innerHTML = response.msg + "<br><br><small>【画面をタップするとカメラに戻ります】</small>";
    
    // 画面タップでカメラに戻る処理を追加
    resultView.onclick = function() {
      resultView.onclick = null; // 連打防止のためにイベントを解除
      startScanner(); // カメラに戻る
    };
  }
}
    window.onload = startScanner;
  </script>
</body>
</html>
